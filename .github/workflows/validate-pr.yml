name: Validate pull request

on:
  pull_request:
    paths:
      - "pets/**"
      - "scripts/**"
      - "schema/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate pet entries
        run: npm run validate
