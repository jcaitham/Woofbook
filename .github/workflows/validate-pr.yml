name: Validate pull request

on:
  pull_request:
    paths:
      - "pets/**"
      - "scripts/**"
      - "schema/**"
      - ".github/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Reject generated manifest in pull request
        env:
          GITHUB_BASE_REF: ${{ github.base_ref }}
        run: node scripts/contribution.js --pr

      - name: Validate pet entries
        run: npm run validate
